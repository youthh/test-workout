<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<title>IRON ACADEMY — Тести для тренера</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0a0a0a;
    --bg-card: #161616;
    --bg-card-hover: #1f1f1f;
    --accent: #e63946;
    --accent-hover: #ff4757;
    --accent-glow: rgba(230, 57, 70, 0.35);
    --orange: #ff7b00;
    --text: #f1f1f1;
    --text-dim: #9a9a9a;
    --text-mute: #6a6a6a;
    --border: #2a2a2a;
    --good: #2ecc71;
    --good-bg: rgba(46, 204, 113, 0.12);
    --bad: #e63946;
    --bad-bg: rgba(230, 57, 70, 0.12);
  }
  html { -webkit-text-size-adjust: 100%; }
  html, body {
    background:
      radial-gradient(circle at 20% 0%, rgba(230,57,70,0.10), transparent 50%),
      radial-gradient(circle at 80% 100%, rgba(255,123,0,0.08), transparent 50%),
      var(--bg);
    color: var(--text);
    font-family: 'Bebas Neue','Oswald','Roboto Condensed', system-ui, -apple-system, 'Segoe UI', Arial, sans-serif;
    min-height: 100vh;
    line-height: 1.5;
    letter-spacing: 0.3px;
    overflow-x: hidden;
  }
  body {
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 40px 40px;
    background-attachment: fixed;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .container {
    max-width: 980px;
    margin: 0 auto;
    padding: 30px 22px 60px;
  }

  /* HERO */
  .hero {
    text-align: center;
    padding: 30px 10px 24px;
    border-bottom: 2px solid var(--border);
    margin-bottom: 36px;
    position: relative;
  }
  .hero::after {
    content: "";
    position: absolute;
    bottom: -2px; left: 50%;
    transform: translateX(-50%);
    width: 120px; height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }
  .brand-icon {
    width: 54px; height: 54px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, var(--accent), #b3242f);
    border-radius: 12px;
    font-size: 28px;
    box-shadow: 0 0 28px var(--accent-glow);
    margin-bottom: 12px;
  }
  h1.title {
    font-family: 'Impact','Bebas Neue', sans-serif;
    font-size: clamp(30px, 7vw, 56px);
    letter-spacing: 3px;
    text-transform: uppercase;
    line-height: 1;
    background: linear-gradient(180deg, #ffffff 0%, #c8c8c8 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .subtitle {
    color: var(--text-dim);
    font-size: clamp(12px, 3vw, 15px);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 6px;
  }
  .subtitle span { color: var(--accent); font-weight: 700; }
  .tag-line {
    margin-top: 18px;
    font-size: clamp(12px, 2.6vw, 14px);
    color: var(--text-mute);
    font-style: italic;
    letter-spacing: 0.5px;
    padding: 0 10px;
  }

  /* TOPICS */
  .section-label {
    text-transform: uppercase;
    letter-spacing: 3px;
    font-size: 13px;
    color: var(--text-mute);
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .section-label::before, .section-label::after {
    content: "";
    height: 1px;
    flex: 1;
    background: var(--border);
  }
  .topics {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 16px;
    margin-bottom: 26px;
  }
  .topic-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px 20px;
    cursor: pointer;
    transition: all .25s ease;
    position: relative;
    overflow: hidden;
    text-align: left;
    color: inherit;
    font-family: inherit;
    width: 100%;
  }
  .topic-card::before {
    content: "";
    position: absolute;
    top: 0; left: 0;
    width: 4px; height: 100%;
    background: var(--accent);
    transform: scaleY(0);
    transform-origin: top;
    transition: transform .3s ease;
  }
  .topic-card:hover, .topic-card:active {
    background: var(--bg-card-hover);
    border-color: var(--accent);
    transform: translateY(-3px);
    box-shadow: 0 12px 28px rgba(0,0,0,0.5), 0 0 18px var(--accent-glow);
  }
  .topic-card:hover::before, .topic-card:active::before { transform: scaleY(1); }
  .topic-head {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
  }
  .topic-num {
    font-family: 'Impact', sans-serif;
    font-size: 30px;
    color: var(--accent);
    line-height: 1;
    letter-spacing: 1px;
    min-width: 38px;
  }
  .topic-icon {
    font-size: 26px;
    margin-left: auto;
    opacity: 0.7;
  }
  .topic-card h3 {
    font-size: 19px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    margin-bottom: 8px;
    color: var(--text);
    line-height: 1.2;
  }
  .topic-card p {
    color: var(--text-dim);
    font-size: 13px;
    margin-bottom: 14px;
    min-height: 50px;
    line-height: 1.45;
  }
  .topic-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid var(--border);
    padding-top: 12px;
    font-size: 12px;
    color: var(--text-mute);
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }
  .start-btn {
    color: var(--accent);
    font-weight: 700;
  }

  /* QUIZ */
  .quiz-screen { display: none; }
  .quiz-screen.active { display: block; }
  .quiz-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 22px;
    gap: 12px;
    flex-wrap: wrap;
  }
  .back-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-size: 12px;
    transition: all .2s;
    min-height: 38px;
    white-space: nowrap;
  }
  .back-btn:hover, .back-btn:active { border-color: var(--accent); color: var(--accent); }
  .quiz-title {
    flex: 1;
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-size: clamp(13px, 3.4vw, 18px);
    color: var(--text);
    min-width: 0;
  }
  .quiz-counter {
    color: var(--text-mute);
    font-size: 12px;
    letter-spacing: 1.5px;
    white-space: nowrap;
  }
  .quiz-counter b { color: var(--accent); }

  .progress {
    height: 6px;
    background: var(--bg-card);
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 24px;
    border: 1px solid var(--border);
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--orange));
    width: 0%;
    transition: width .35s ease;
    box-shadow: 0 0 8px var(--accent-glow);
  }

  .question-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px 22px;
    box-shadow: 0 8px 22px rgba(0,0,0,0.4);
  }
  .question {
    font-size: clamp(16px, 4vw, 19px);
    margin-bottom: 22px;
    line-height: 1.5;
    color: var(--text);
  }
  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .option {
    background: #1d1d1d;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 14px;
    cursor: pointer;
    transition: background .15s, border-color .15s, transform .15s;
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: inherit;
    color: var(--text);
    text-align: left;
    width: 100%;
    font-size: clamp(14px, 3.6vw, 15px);
    line-height: 1.4;
    min-height: 50px;
  }
  .option:hover:not(:disabled), .option:active:not(:disabled) {
    border-color: var(--accent);
    background: #232323;
  }
  .option:hover:not(:disabled) { transform: translateX(4px); }
  .option:disabled { cursor: default; }
  .option-letter {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 30px; height: 30px;
    border-radius: 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--accent);
    font-weight: 700;
    font-size: 14px;
    flex-shrink: 0;
  }
  .option.correct {
    background: var(--good-bg);
    border-color: var(--good);
  }
  .option.correct .option-letter {
    background: var(--good);
    color: #061a0d;
    border-color: var(--good);
  }
  .option.wrong {
    background: var(--bad-bg);
    border-color: var(--bad);
  }
  .option.wrong .option-letter {
    background: var(--bad);
    color: #fff;
    border-color: var(--bad);
  }

  .explanation {
    margin-top: 20px;
    padding: 14px 16px;
    background: #121212;
    border-left: 3px solid var(--accent);
    border-radius: 8px;
    color: var(--text-dim);
    font-size: 13.5px;
    line-height: 1.6;
    display: none;
  }
  .explanation.show { display: block; animation: fadeIn .25s ease; }
  .explanation b { color: var(--text); }
  .explanation .verdict {
    display: inline-block;
    margin-right: 8px;
    text-transform: uppercase;
    font-size: 11px;
    letter-spacing: 1.5px;
    padding: 3px 8px;
    border-radius: 4px;
    font-weight: 700;
    vertical-align: middle;
  }
  .verdict.good { background: var(--good); color: #061a0d; }
  .verdict.bad { background: var(--bad); color: #fff; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-5px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .next-btn {
    margin-top: 20px;
    background: linear-gradient(180deg, var(--accent), #b3242f);
    color: #fff;
    border: none;
    padding: 14px 24px;
    border-radius: 10px;
    font-family: inherit;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 2px;
    font-weight: 700;
    cursor: pointer;
    width: 100%;
    transition: all .2s;
    display: none;
    box-shadow: 0 4px 14px var(--accent-glow);
    min-height: 50px;
  }
  .next-btn.show { display: block; }
  .next-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 22px var(--accent-glow); }

  /* RESULT */
  .result-card {
    text-align: center;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 36px 22px;
  }
  .result-emoji { font-size: 56px; margin-bottom: 12px; }
  .result-title {
    font-family: 'Impact', sans-serif;
    font-size: clamp(26px, 7vw, 36px);
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-bottom: 8px;
  }
  .result-subtitle {
    color: var(--text-dim);
    margin-bottom: 24px;
    font-size: clamp(13px, 3.4vw, 15px);
    padding: 0 10px;
  }
  .score-big {
    font-family: 'Impact', sans-serif;
    font-size: clamp(56px, 16vw, 80px);
    line-height: 1;
    background: linear-gradient(180deg, var(--accent), var(--orange));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    margin: 10px 0;
  }
  .score-detail {
    color: var(--text-dim);
    font-size: 14px;
    margin-bottom: 24px;
    letter-spacing: 1px;
  }
  .actions {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .btn-primary, .btn-secondary {
    padding: 12px 20px;
    border-radius: 10px;
    font-family: inherit;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-weight: 700;
    cursor: pointer;
    transition: all .2s;
    border: none;
    min-height: 46px;
    flex: 1 1 auto;
    min-width: 140px;
  }
  .btn-primary {
    background: linear-gradient(180deg, var(--accent), #b3242f);
    color: #fff;
    box-shadow: 0 4px 12px var(--accent-glow);
  }
  .btn-primary:hover { transform: translateY(-2px); }
  .btn-secondary {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

  footer {
    text-align: center;
    margin-top: 50px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    color: var(--text-mute);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  footer .heart { color: var(--accent); }

  /* TABLET */
  @media (max-width: 768px) {
    .container { padding: 22px 16px 50px; }
    .hero { padding: 22px 6px 18px; margin-bottom: 28px; }
    .topics { grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); }
  }

  /* MOBILE */
  @media (max-width: 540px) {
    .container { padding: 18px 12px 40px; }
    .hero { padding: 18px 4px 16px; margin-bottom: 22px; }
    .brand-icon { width: 46px; height: 46px; font-size: 24px; margin-bottom: 8px; }
    .topics { grid-template-columns: 1fr; gap: 12px; }
    .topic-card { padding: 18px 16px; }
    .topic-card p { min-height: 0; margin-bottom: 12px; }
    .question-card { padding: 20px 16px; border-radius: 12px; }
    .option { padding: 12px 12px; gap: 10px; }
    .quiz-header { gap: 8px; }
    .quiz-title { order: 3; flex-basis: 100%; text-align: left; padding-top: 4px; }
    .back-btn { flex: 0 0 auto; }
    .quiz-counter { flex: 0 0 auto; margin-left: auto; }
    .actions { flex-direction: column; }
    .btn-primary, .btn-secondary { width: 100%; }
    footer { font-size: 10px; letter-spacing: 1.5px; }
  }

  /* SMALL */
  @media (max-width: 360px) {
    .option-letter { width: 26px; height: 26px; font-size: 13px; }
    .topic-card h3 { font-size: 17px; }
  }
</style>
</head>
<body>

<div class="container">

  <div class="hero">
    <span class="brand-icon">&#x1F4AA;</span>
    <h1 class="title">Iron Academy</h1>
    <div class="subtitle">Тести для майбутнього <span>тренера</span></div>
    <div class="tag-line">"Move well first, then move often." — Gray Cook</div>
  </div>

  <div id="topic-select">
    <div class="section-label">Обери тему</div>
    <div class="topics" id="topics-list"></div>
  </div>

  <div class="quiz-screen" id="quiz-screen">
    <div class="quiz-header">
      <button class="back-btn" onclick="backToTopics()">&larr; До тем</button>
      <div class="quiz-counter">Питання <b id="q-current">1</b>/<span id="q-total">10</span></div>
      <div class="quiz-title" id="quiz-title"></div>
    </div>
    <div class="progress"><div class="progress-bar" id="progress-bar"></div></div>
    <div id="quiz-body"></div>
  </div>

  <div class="quiz-screen" id="result-screen">
    <div class="result-card">
      <div class="result-emoji" id="result-emoji">&#x1F525;</div>
      <div class="result-title" id="result-title">Готово!</div>
      <div class="result-subtitle" id="result-subtitle"></div>
      <div class="score-big"><span id="score-num">0</span>/<span id="score-total">0</span></div>
      <div class="score-detail" id="score-percent">0%</div>
      <div class="actions">
        <button class="btn-primary" onclick="restartQuiz()">Ще раз</button>
        <button class="btn-secondary" onclick="backToTopics()">Інша тема</button>
      </div>
    </div>
  </div>

  <footer>
    Made with <span class="heart">&#x2764;</span> Iron Academy &middot; на основі твоїх матеріалів
  </footer>
</div>

<script>
const TOPICS = [
  {
    id: "osteology",
    icon: "&#x1F9B4;",
    title: "Остеологія",
    desc: "Скелет, кістки, хребет, ребра, кінцівки — будова і назви.",
    questions: [
      { q: "Зі скількох кісток складається твердий скелет дорослої людини?", a: ["120–130", "150–170", "206–210", "300+"], c: 2, e: "Згідно з матеріалом «Остеологія», твердий скелет дорослої людини складається з 206–210 кісток, з яких 33–35 — непарні." },
      { q: "Яка частина опорно-рухового апарату є «активною»?", a: ["Кістки", "З'єднання між кістками", "Скелетні посмуговані м'язи", "Зв'язки і фасції"], c: 2, e: "Опорно-руховий апарат має пасивну частину (кістки і з'єднання) і активну — скелетні посмуговані м'язи, які приводять кістки в рух." },
      { q: "Скільки шийних хребців у людини?", a: ["5", "7", "12", "5 крижових"], c: 1, e: "У людини, як і у всіх ссавців, 7 шийних хребців — і у жирафа, і у миші їх теж 7. Усього хребет має 7 шийних, 12 грудних, 5 поперекових, 5 крижових і 2–4 куприкових." },
      { q: "Як називається перший шийний хребець, який не має тіла й остистого відростка?", a: ["Осьовий (axis)", "Атлант (atlas)", "Виступний (vertebra prominens)", "Куприк"], c: 1, e: "Перший шийний хребець — атлант (atlas). Він не має тіла, остистого і суглобових відростків — має кільцеподібну форму з передньою і задньою дугами." },
      { q: "У якому суглобі знаходиться зуб, навколо якого обертається інший хребець?", a: ["Між атлантом і потиличною кісткою", "Між атлантом і осьовим хребцем", "Між осьовим та III шийним", "Атланто-плечовий"], c: 1, e: "Осьовий хребець (axis) має «зуб» (dens axis), що входить в ямку зуба атланта. При поворотах голови атлант разом із черепом обертається навколо цього зуба." },
      { q: "Скільки пар ребер у людини і які з них називають «справжніми»?", a: ["10 пар, справжні — 7 верхніх", "12 пар, справжні — 7 верхніх (з'єднуються з грудниною)", "12 пар, всі справжні", "8 пар, справжні — нижні"], c: 1, e: "У скелеті 12 пар ребер. Сім верхніх (I–VII) безпосередньо з'єднуються хрящем з грудниною — це справжні ребра. Нижні 5 (VIII–XII) — несправжні; XI–XII звуть «коливними»." },
      { q: "У місці якого хребця проходить межа між шиєю та спиною (його остистий відросток найдовший і виступає)?", a: ["I шийний (атлант)", "II шийний (осьовий)", "VII шийний (виступний)", "I грудний"], c: 2, e: "VII шийний — vertebra prominens («виступний хребець»). Його остистий відросток найдовший і легко пальпується — є орієнтиром межі шиї та спини." },

      { q: "Який тип темпераменту схильний до «стартової апатії», тривожний і не вірить у власні сили?", a: ["Сангвінік", "Холерик", "Флегматик", "Меланхолік"], c: 3, e: "Меланхолік — слабкість процесів збудження та гальмування. Висока тривожність, невпевненість, болісно реагує на критику. Змагальні результати нестабільні через стан «стартової апатії»." },
      { q: "Які особливості ФЛЕГМАТИКА у спорті?", a: ["Швидко вчиться, легко перемикається", "Дуже працелюбний, схильний до довгого і ретельного відпрацювання техніки, віддає перевагу одноманітним вправам", "Постійно прагне новизни, не любить рутини", "Емоції виплескує бурхливо"], c: 1, e: "Флегматик — переважання гальмування над збудженням. Працелюбний, стійкий, віддає перевагу спокійним одноманітним вправам, кропіткому відпрацюванню техніки. Перед стартом — «бойова готовність», результати стабільні." },

      { q: "Яке «головне слово» у ВІЗУАЛА?", a: ["Тихо", "Гарно", "Зручно", "Функціонально"], c: 1, e: "Головне слово візуала — «гарно». У аудіала — «тихо», у кінестета — «зручно», у дигітала — «функціонально»." },
      { q: "Яка типова поза та дихання у ДИГІТАЛА?", a: ["Розслаблена поза, низьке дихання", "Схрещені руки, пряма постава, обмежене дихання, монотонний голос", "Голова на бік, мелодійний голос", "Голова й плечі припідняті, високе грудне дихання"], c: 1, e: "Дигітал: схрещені руки, пряма постава, піднята голова, обмежене дихання, монотонний переривистий густий голос. Зорового контакту уникає. При стресі стає надраціональним. Головне слово — «функціонально»." },

    ]
  }
];

const $ = (id) => document.getElementById(id);
let state = { topicIdx: 0, qIdx: 0, score: 0, locked: false };

function renderTopics() {
  $("topics-list").innerHTML = TOPICS.map((t, i) => `
    <button class="topic-card" onclick="startQuiz(${i})">
      <div class="topic-head">
        <span class="topic-num">${String(i+1).padStart(2, '0')}</span>
        <span class="topic-icon">${t.icon}</span>
      </div>
      <h3>${t.title}</h3>
      <p>${t.desc}</p>
      <div class="topic-meta">
        <span>${t.questions.length} питань</span>
        <span class="start-btn">Почати &rarr;</span>
      </div>
    </button>
  `).join("");
}

function startQuiz(idx) {
  state = { topicIdx: idx, qIdx: 0, score: 0, locked: false };
  $("topic-select").style.display = "none";
  $("result-screen").classList.remove("active");
  $("quiz-screen").classList.add("active");
  $("quiz-title").textContent = TOPICS[idx].title;
  $("q-total").textContent = TOPICS[idx].questions.length;
  window.scrollTo({ top: 0, behavior: 'smooth' });
  renderQuestion();
}

function renderQuestion() {
  const t = TOPICS[state.topicIdx];
  const q = t.questions[state.qIdx];
  $("q-current").textContent = state.qIdx + 1;
  $("progress-bar").style.width = (state.qIdx / t.questions.length * 100) + "%";
  const letters = ["А", "Б", "В", "Г"];
  $("quiz-body").innerHTML = `
    <div class="question-card">
      <div class="question">${q.q}</div>
      <div class="options">
        ${q.a.map((opt, i) => `
          <button class="option" data-i="${i}" onclick="answer(${i})">
            <span class="option-letter">${letters[i]}</span>
            <span>${opt}</span>
          </button>
        `).join("")}
      </div>
      <div class="explanation" id="explanation"></div>
      <button class="next-btn" id="next-btn" onclick="nextQuestion()">
        ${state.qIdx + 1 < t.questions.length ? "Наступне питання &rarr;" : "Подивитись результат"}
      </button>
    </div>
  `;
  state.locked = false;
}

function answer(idx) {
  if (state.locked) return;
  state.locked = true;
  const t = TOPICS[state.topicIdx];
  const q = t.questions[state.qIdx];
  const correct = q.c;
  const isCorrect = idx === correct;
  if (isCorrect) state.score++;
  document.querySelectorAll(".option").forEach((b) => {
    b.disabled = true;
    const i = +b.dataset.i;
    if (i === correct) b.classList.add("correct");
    if (i === idx && !isCorrect) b.classList.add("wrong");
  });
  const exp = $("explanation");
  exp.innerHTML = `
    <span class="verdict ${isCorrect ? 'good' : 'bad'}">${isCorrect ? '&#x2713; Вірно' : '&#x2717; Не вірно'}</span>
    <b>Правильна відповідь: ${["А","Б","В","Г"][correct]}.</b> ${q.e}
  `;
  exp.classList.add("show");
  $("next-btn").classList.add("show");
  $("progress-bar").style.width = ((state.qIdx + 1) / t.questions.length * 100) + "%";
  // Прокрутка до пояснення на мобілі
  setTimeout(() => exp.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 100);
}

function nextQuestion() {
  const t = TOPICS[state.topicIdx];
  state.qIdx++;
  if (state.qIdx >= t.questions.length) {
    showResult();
  } else {
    renderQuestion();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function showResult() {
  const t = TOPICS[state.topicIdx];
  const total = t.questions.length;
  const pct = Math.round((state.score / total) * 100);
  $("quiz-screen").classList.remove("active");
  $("result-screen").classList.add("active");
  $("score-num").textContent = state.score;
  $("score-total").textContent = total;
  $("score-percent").textContent = pct + "% правильних відповідей";
  let emoji = "&#x1F4AA;", title = "Гарний результат!", sub = "Ще трохи практики і буде ідеально.";
  if (pct === 100) { emoji = "&#x1F3C6;"; title = "Чемпіон!"; sub = "Усі питання — у яблучко. Ти готовий!"; }
  else if (pct >= 85) { emoji = "&#x1F525;"; title = "Майже бездоганно"; sub = "Лише дрібниці залишилось підтягнути."; }
  else if (pct >= 70) { emoji = "&#x1F4AA;"; title = "Добре"; sub = "Базу опанував. Перечитай складні питання."; }
  else if (pct >= 50) { emoji = "&#x26A1;"; title = "Можна краще"; sub = "Повтори тему і пройди ще раз."; }
  else { emoji = "&#x1F4DA;"; title = "Час повертатись до матеріалу"; sub = "Не страшно — кожен починав з нуля."; }
  $("result-emoji").innerHTML = emoji;
  $("result-title").textContent = title;
  $("result-subtitle").textContent = sub;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function restartQuiz() { startQuiz(state.topicIdx); }

function backToTopics() {
  $("quiz-screen").classList.remove("active");
  $("result-screen").classList.remove("active");
  $("topic-select").style.display = "block";
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

renderTopics();
</script>
