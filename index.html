<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<title>IRON ACADEMY — Тести для тренера</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%23e63946'/%3E%3Cstop offset='1' stop-color='%23b3242f'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='22' fill='url(%23g)'/%3E%3Ctext x='50' y='72' font-family='Impact,Arial Black,sans-serif' font-size='60' fill='white' text-anchor='middle' font-weight='900'%3EIA%3C/text%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23e63946'/%3E%3Ctext x='50' y='72' font-family='Impact,Arial Black,sans-serif' font-size='60' fill='white' text-anchor='middle' font-weight='900'%3EIA%3C/text%3E%3C/svg%3E">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0a0a0a;
    --bg-card: #161616;
    --bg-card-hover: #1f1f1f;
    --accent: #e63946;
    --accent-glow: rgba(230, 57, 70, 0.35);
    --orange: #ff7b00;
    --text: #f1f1f1;
    --text-dim: #9a9a9a;
    --text-mute: #6a6a6a;
    --border: #2a2a2a;
    --good: #2ecc71;
    --good-bg: rgba(46, 204, 113, 0.12);
    --bad: #e63946;
    --bad-bg: rgba(230, 57, 70, 0.12);
  }
  html { -webkit-text-size-adjust: 100%; }
  html, body {
    background:
      radial-gradient(circle at 20% 0%, rgba(230,57,70,0.10), transparent 50%),
      radial-gradient(circle at 80% 100%, rgba(255,123,0,0.08), transparent 50%),
      var(--bg);
    color: var(--text);
    font-family: 'Bebas Neue','Oswald','Roboto Condensed', system-ui, -apple-system, 'Segoe UI', Arial, sans-serif;
    min-height: 100vh;
    line-height: 1.5;
    letter-spacing: 0.3px;
    overflow-x: hidden;
  }
  body {
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 40px 40px;
    background-attachment: fixed;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .container { max-width: 980px; margin: 0 auto; padding: 30px 22px 60px; }
  .hero {
    text-align: center;
    padding: 30px 10px 24px;
    border-bottom: 2px solid var(--border);
    margin-bottom: 36px;
    position: relative;
  }
  .hero::after {
    content: ""; position: absolute; bottom: -2px; left: 50%;
    transform: translateX(-50%); width: 120px; height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }
  .brand-icon {
    width: 54px; height: 54px;
    display: inline-flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, var(--accent), #b3242f);
    border-radius: 12px; font-size: 28px;
    box-shadow: 0 0 28px var(--accent-glow);
    margin-bottom: 12px;
  }
  h1.title {
    font-family: 'Impact','Bebas Neue', sans-serif;
    font-size: clamp(30px, 7vw, 56px);
    letter-spacing: 3px; text-transform: uppercase; line-height: 1;
    background: linear-gradient(180deg, #ffffff 0%, #c8c8c8 100%);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
  }
  .subtitle {
    color: var(--text-dim); font-size: clamp(12px, 3vw, 15px);
    letter-spacing: 2px; text-transform: uppercase; margin-top: 6px;
  }
  .subtitle span { color: var(--accent); font-weight: 700; }
  .tag-line {
    margin-top: 18px; font-size: clamp(12px, 2.6vw, 14px);
    color: var(--text-mute); font-style: italic;
    letter-spacing: 0.5px; padding: 0 10px;
  }
  .section-label {
    text-transform: uppercase; letter-spacing: 3px; font-size: 13px;
    color: var(--text-mute); margin-bottom: 18px;
    display: flex; align-items: center; gap: 12px;
  }
  .section-label::before, .section-label::after {
    content: ""; height: 1px; flex: 1; background: var(--border);
  }
  .topics {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 16px; margin-bottom: 26px;
  }
  .topic-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 14px; padding: 22px 20px; cursor: pointer;
    transition: all .25s ease; position: relative; overflow: hidden;
    text-align: left; color: inherit; font-family: inherit; width: 100%;
  }
  .topic-card::before {
    content: ""; position: absolute; top: 0; left: 0;
    width: 4px; height: 100%; background: var(--accent);
    transform: scaleY(0); transform-origin: top; transition: transform .3s ease;
  }
  .topic-card:hover, .topic-card:active {
    background: var(--bg-card-hover); border-color: var(--accent);
    transform: translateY(-3px);
    box-shadow: 0 12px 28px rgba(0,0,0,0.5), 0 0 18px var(--accent-glow);
  }
  .topic-card:hover::before, .topic-card:active::before { transform: scaleY(1); }
  .topic-head { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .topic-num {
    font-family: 'Impact', sans-serif; font-size: 30px;
    color: var(--accent); line-height: 1; letter-spacing: 1px; min-width: 38px;
  }
  .topic-icon { font-size: 26px; margin-left: auto; opacity: 0.7; }
  .topic-card h3 {
    font-size: 19px; text-transform: uppercase; letter-spacing: 1.2px;
    margin-bottom: 8px; color: var(--text); line-height: 1.2;
  }
  .topic-card p {
    color: var(--text-dim); font-size: 13px;
    margin-bottom: 14px; min-height: 50px; line-height: 1.45;
  }
  .topic-meta {
    display: flex; justify-content: space-between; align-items: center;
    border-top: 1px solid var(--border); padding-top: 12px;
    font-size: 12px; color: var(--text-mute);
    text-transform: uppercase; letter-spacing: 1.5px;
  }
  .start-btn { color: var(--accent); font-weight: 700; }
  .quiz-screen { display: none; }
  .quiz-screen.active { display: block; }
  .quiz-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 22px; gap: 12px; flex-wrap: wrap;
  }
  .back-btn {
    background: transparent; border: 1px solid var(--border);
    color: var(--text-dim); padding: 8px 14px; border-radius: 8px;
    cursor: pointer; font-family: inherit; text-transform: uppercase;
    letter-spacing: 1.5px; font-size: 12px; transition: all .2s;
    min-height: 38px; white-space: nowrap;
  }
  .back-btn:hover, .back-btn:active { border-color: var(--accent); color: var(--accent); }
  .quiz-title {
    flex: 1; text-align: center; text-transform: uppercase;
    letter-spacing: 1.5px; font-size: clamp(13px, 3.4vw, 18px);
    color: var(--text); min-width: 0;
  }
  .quiz-counter {
    color: var(--text-mute); font-size: 12px;
    letter-spacing: 1.5px; white-space: nowrap;
  }
  .quiz-counter b { color: var(--accent); }
  .progress {
    height: 6px; background: var(--bg-card); border-radius: 4px;
    overflow: hidden; margin-bottom: 24px; border: 1px solid var(--border);
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--orange));
    width: 0%; transition: width .35s ease;
    box-shadow: 0 0 8px var(--accent-glow);
  }
  .question-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 14px; padding: 24px 22px;
    box-shadow: 0 8px 22px rgba(0,0,0,0.4);
  }
  .question {
    font-size: clamp(16px, 4vw, 19px); margin-bottom: 22px;
    line-height: 1.5; color: var(--text);
  }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option {
    background: #1d1d1d; border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 14px; cursor: pointer;
    transition: background .15s, border-color .15s, transform .15s;
    display: flex; align-items: center; gap: 12px;
    font-family: inherit; color: var(--text); text-align: left;
    width: 100%; font-size: clamp(14px, 3.6vw, 15px);
    line-height: 1.4; min-height: 50px;
  }
  .option:hover:not(:disabled), .option:active:not(:disabled) {
    border-color: var(--accent); background: #232323;
  }
  .option:hover:not(:disabled) { transform: translateX(4px); }
  .option:disabled { cursor: default; }
  .option-letter {
    display: inline-flex; align-items: center; justify-content: center;
    width: 30px; height: 30px; border-radius: 8px;
    background: var(--bg); border: 1px solid var(--border);
    color: var(--accent); font-weight: 700; font-size: 14px; flex-shrink: 0;
  }
  .option.correct { background: var(--good-bg); border-color: var(--good); }
  .option.correct .option-letter { background: var(--good); color: #061a0d; border-color: var(--good); }
  .option.wrong { background: var(--bad-bg); border-color: var(--bad); }
  .option.wrong .option-letter { background: var(--bad); color: #fff; border-color: var(--bad); }
  .explanation {
    margin-top: 20px; padding: 14px 16px;
    background: #121212; border-left: 3px solid var(--accent);
    border-radius: 8px; color: var(--text-dim);
    font-size: 13.5px; line-height: 1.6; display: none;
  }
  .explanation.show { display: block; animation: fadeIn .25s ease; }
  .explanation b { color: var(--text); }
  .explanation .verdict {
    display: inline-block; margin-right: 8px; text-transform: uppercase;
    font-size: 11px; letter-spacing: 1.5px; padding: 3px 8px;
    border-radius: 4px; font-weight: 700; vertical-align: middle;
  }
  .verdict.good { background: var(--good); color: #061a0d; }
  .verdict.bad { background: var(--bad); color: #fff; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
  .next-btn {
    margin-top: 20px;
    background: linear-gradient(180deg, var(--accent), #b3242f);
    color: #fff; border: none; padding: 14px 24px;
    border-radius: 10px; font-family: inherit; font-size: 14px;
    text-transform: uppercase; letter-spacing: 2px; font-weight: 700;
    cursor: pointer; width: 100%; transition: all .2s; display: none;
    box-shadow: 0 4px 14px var(--accent-glow); min-height: 50px;
  }
  .next-btn.show { display: block; }
  .next-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 22px var(--accent-glow); }
  .result-card {
    text-align: center; background: var(--bg-card);
    border: 1px solid var(--border); border-radius: 16px; padding: 36px 22px;
  }
  .result-emoji { font-size: 56px; margin-bottom: 12px; }
  .result-title {
    font-family: 'Impact', sans-serif;
    font-size: clamp(26px, 7vw, 36px);
    text-transform: uppercase; letter-spacing: 3px; margin-bottom: 8px;
  }
  .result-subtitle {
    color: var(--text-dim); margin-bottom: 24px;
    font-size: clamp(13px, 3.4vw, 15px); padding: 0 10px;
  }
  .score-big {
    font-family: 'Impact', sans-serif;
    font-size: clamp(56px, 16vw, 80px); line-height: 1;
    background: linear-gradient(180deg, var(--accent), var(--orange));
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    margin: 10px 0;
  }
  .score-detail { color: var(--text-dim); font-size: 14px; margin-bottom: 24px; letter-spacing: 1px; }
  .actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .btn-primary, .btn-secondary, .btn-share {
    padding: 12px 20px; border-radius: 10px; font-family: inherit;
    font-size: 13px; text-transform: uppercase; letter-spacing: 1.5px;
    font-weight: 700; cursor: pointer; transition: all .2s; border: none;
    min-height: 46px; flex: 1 1 auto; min-width: 140px;
  }
  .btn-share {
    background: linear-gradient(180deg, var(--orange), #c95a00);
    color: #fff; box-shadow: 0 4px 12px rgba(255,123,0,0.3);
  }
  .btn-share:hover { transform: translateY(-2px); }
  .toast {
    position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%);
    background: #1d1d1d; border: 1px solid var(--accent);
    color: var(--text); padding: 12px 20px; border-radius: 10px;
    font-size: 13px; letter-spacing: 1px; z-index: 1000;
    box-shadow: 0 8px 24px rgba(0,0,0,0.6);
    opacity: 0; pointer-events: none; transition: opacity .25s;
  }
  .toast.show { opacity: 1; }
  .card-shuffle {
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px; margin: 0 0 12px 0;
    padding: 8px 12px; border-radius: 8px;
    background: #121212; border: 1px solid var(--border);
    font-size: 12px; text-transform: uppercase; letter-spacing: 1.2px;
    color: var(--text-dim);
    cursor: pointer; transition: all .2s;
  }
  .card-shuffle:hover { border-color: var(--accent); color: var(--text); }
  .card-shuffle.on { border-color: var(--accent); color: var(--accent); background: rgba(230,57,70,0.07); }
  .card-shuffle .left { display: flex; align-items: center; gap: 8px; }
  .card-shuffle .icon { font-size: 14px; }
  .mini-toggle {
    position: relative; width: 36px; height: 20px;
    background: #2a2a2a; border-radius: 12px; flex-shrink: 0;
    transition: background .2s;
  }
  .mini-toggle::after {
    content: ""; position: absolute; top: 2px; left: 2px;
    width: 16px; height: 16px; background: var(--text-dim);
    border-radius: 50%; transition: all .2s;
  }
  .card-shuffle.on .mini-toggle { background: var(--accent); }
  .card-shuffle.on .mini-toggle::after { left: 18px; background: #fff; }
  .btn-primary {
    background: linear-gradient(180deg, var(--accent), #b3242f);
    color: #fff; box-shadow: 0 4px 12px var(--accent-glow);
  }
  .btn-primary:hover { transform: translateY(-2px); }
  .btn-secondary { background: transparent; color: var(--text-dim); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  footer {
    text-align: center; margin-top: 50px; padding-top: 20px;
    border-top: 1px solid var(--border); color: var(--text-mute);
    font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
    line-height: 1.7;
  }
  footer .heart { color: var(--accent); }
  footer .copyright-main {
    color: var(--text-dim); font-weight: 700;
  }
  footer .copyright-sub {
    font-size: 10px; opacity: 0.8; margin-top: 2px;
  }
  /* TOP ACTIONS */
  .top-actions {
    display: flex; gap: 10px; margin-bottom: 22px; flex-wrap: wrap;
  }
  .action-btn {
    flex: 1 1 160px; display: flex; align-items: center; gap: 10px;
    background: var(--bg-card); border: 1px solid var(--border);
    color: var(--text); padding: 12px 16px; border-radius: 12px;
    cursor: pointer; font-family: inherit;
    font-size: 13px; text-transform: uppercase; letter-spacing: 1.2px;
    font-weight: 700; transition: all .2s;
  }
  .action-btn:hover { border-color: var(--accent); transform: translateY(-2px); }
  .action-btn .ico { font-size: 18px; }
  .action-btn .action-pill {
    margin-left: auto;
    background: var(--accent); color: #fff;
    padding: 2px 8px; border-radius: 10px;
    font-size: 11px; letter-spacing: 0;
  }

  /* TIMER */
  .timer-row {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 16px;
  }
  .timer-track {
    flex: 1; height: 8px; background: #2a2a2a;
    border-radius: 4px; overflow: hidden;
  }
  .timer-fill {
    height: 100%; width: 100%;
    background: linear-gradient(90deg, var(--good), var(--orange));
    transition: width .1s linear, background .3s;
    border-radius: 4px;
  }
  .timer-fill.low {
    background: linear-gradient(90deg, var(--orange), var(--accent));
    animation: pulseRed 0.5s infinite alternate;
  }
  @keyframes pulseRed { from { opacity: 0.7; } to { opacity: 1; } }
  .timer-text {
    font-family: 'Impact', sans-serif;
    color: var(--text-dim); font-size: 18px;
    min-width: 50px; text-align: right;
  }

  /* HINT */
  .hint-btn {
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px; padding: 10px 14px; margin-bottom: 14px;
    border-radius: 10px; cursor: pointer;
    background: rgba(241,196,15,0.08); border: 1px solid rgba(241,196,15,0.4);
    color: #f1c40f; font-family: inherit;
    font-size: 13px; text-transform: uppercase; letter-spacing: 1.2px;
    font-weight: 700; width: 100%; transition: all .2s;
  }
  .hint-btn:hover:not(.used) { background: rgba(241,196,15,0.18); transform: translateX(2px); }
  .hint-btn.used { opacity: 0.4; cursor: not-allowed; }
  .hint-btn .hint-pill {
    font-size: 11px; padding: 2px 8px; border-radius: 10px;
    background: rgba(241,196,15,0.15); letter-spacing: 0.5px;
  }
  .option.hint-hidden {
    opacity: 0.25; pointer-events: none;
    background: #0a0a0a; text-decoration: line-through;
  }

  /* COMBO */
  .combo-indicator {
    position: fixed; top: 80px; right: 20px;
    background: linear-gradient(135deg, var(--accent), var(--orange));
    color: #fff; padding: 8px 14px; border-radius: 20px;
    font-family: 'Impact', sans-serif; font-size: 16px;
    letter-spacing: 1.5px; box-shadow: 0 6px 20px var(--accent-glow);
    z-index: 100; opacity: 0; transform: scale(0.6) translateX(20px);
    transition: all .25s ease;
    pointer-events: none;
  }
  .combo-indicator.show { opacity: 1; transform: scale(1) translateX(0); }
  .combo-indicator.flash { animation: comboBump 0.4s; }
  @keyframes comboBump {
    0% { transform: scale(1) translateX(0); }
    40% { transform: scale(1.2) translateX(0); }
    100% { transform: scale(1) translateX(0); }
  }

  /* REPORT */
  .report-row { margin-top: 12px; }
  .report-link {
    display: inline-block; font-size: 11px;
    color: var(--text-mute); text-decoration: none;
    text-transform: uppercase; letter-spacing: 1.2px;
    padding: 5px 0;
  }
  .report-link:hover { color: var(--accent); }

  /* ACHIEVEMENT TOAST */
  .achv-toast {
    position: fixed; top: 24px; left: 50%;
    transform: translateX(-50%) translateY(-30px);
    background: linear-gradient(135deg, #1f1f1f, #2a1212);
    border: 2px solid var(--accent);
    border-radius: 14px; padding: 12px 18px;
    color: #fff; font-family: inherit;
    display: flex; align-items: center; gap: 12px;
    z-index: 10000; box-shadow: 0 10px 30px rgba(0,0,0,0.6), 0 0 24px var(--accent-glow);
    opacity: 0; transition: all .35s ease;
    max-width: 90vw;
  }
  .achv-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .achv-toast .ico { font-size: 28px; }
  .achv-toast .ttl {
    font-size: 10px; text-transform: uppercase; letter-spacing: 2px;
    color: var(--accent); font-weight: 800;
  }
  .achv-toast .nm { font-size: 16px; font-weight: 700; }

  /* STATS PAGE */
  .stats-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px; margin-bottom: 28px;
  }
  .stat-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px;
  }
  .stat-label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px;
    color: var(--text-mute); margin-bottom: 8px;
  }
  .stat-val {
    font-family: 'Impact', sans-serif; font-size: 32px;
    color: var(--text); line-height: 1;
  }
  .stat-val.accent { color: var(--accent); }
  .stat-val.good { color: var(--good); }
  .stat-val.orange { color: var(--orange); }

  .heatmap-wrap {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px; margin-bottom: 28px;
    overflow-x: auto;
  }
  .heatmap {
    display: grid; grid-auto-flow: column;
    grid-template-rows: repeat(7, 14px);
    gap: 3px; min-width: max-content;
  }
  .heat-cell {
    width: 14px; height: 14px; border-radius: 3px;
    background: #1d1d1d;
  }
  .heat-cell.l1 { background: rgba(230,57,70,0.25); }
  .heat-cell.l2 { background: rgba(230,57,70,0.5); }
  .heat-cell.l3 { background: rgba(230,57,70,0.75); }
  .heat-cell.l4 { background: var(--accent); }
  .heat-legend {
    display: flex; align-items: center; gap: 8px;
    font-size: 11px; color: var(--text-mute);
    margin-top: 12px; letter-spacing: 1.2px; text-transform: uppercase;
  }
  .heat-legend .scale { display: flex; gap: 3px; }

  .topic-stats-list {
    display: flex; flex-direction: column; gap: 10px;
    margin-bottom: 28px;
  }
  .topic-stat-row {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px;
  }
  .topic-stat-row .top {
    display: flex; justify-content: space-between;

  .history-chip.bad .pct { color: var(--bad); }

  /* EXAM CARD */
  #exam-block { margin-bottom: 28px; }
  .exam-card {
    display: block; width: 100%; text-align: center;
    background: linear-gradient(135deg, #1a0808 0%, #2d0a14 50%, #1a0808 100%);

  .exam-card:hover, .exam-card:active {

  .exam-desc {

  @media (max-width: 768px) {

<script>
const TOPICS = [

function todayKey() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function recordAnswer(topicId, isCorrect) {
  stats.totalAnswered++;
  if (isCorrect) stats.totalCorrect++;
  if (!stats.byTopic[topicId]) stats.byTopic[topicId] = { answered: 0, correct: 0 };
  stats.byTopic[topicId].answered++;
  if (isCorrect) stats.byTopic[topicId].correct++;
  const k = todayKey();
  if (!stats.byDate[k]) stats.byDate[k] = { answered: 0, correct: 0 };
  stats.byDate[k].answered++;
  if (isCorrect) stats.byDate[k].correct++;
  saveStats();
}

function recordQuizComplete(opts) {
  stats.quizzesCompleted++;
  if (opts.isExam && opts.pct >= 50) stats.examsPassed++;
  if (opts.maxCombo > stats.bestCombo) stats.bestCombo = opts.maxCombo;
  saveStats();
}

function getStreak() {
  let streak = 0;
  const d = new Date();
  for (let i = 0; i < 365; i++) {
    const k = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    if (stats.byDate[k] && stats.byDate[k].answered > 0) streak++;
    else if (i > 0) break;
    d.setDate(d.getDate() - 1);
  }
  return streak;
}

function checkAchievements(ctx) {
  const newly = [];
  ACHIEVEMENTS.forEach(a => {
    if (achievements.includes(a.id)) return;
    try { if (a.check(ctx || {})) { achievements.push(a.id); newly.push(a); } } catch(e) {}
  });
  if (newly.length) {
    saveAchievements();
    newly.forEach((a, i) => setTimeout(() => showAchievementToast(a), i * 600));
  }
}

function saveMistakes() { try { localStorage.setItem('mistakes', JSON.stringify(mistakes)); } catch(e) {} }
function saveHistory() { try { localStorage.setItem('history', JSON.stringify(history)); } catch(e) {} }

function addMistake(topicId, qIdx) {
  if (!mistakes[topicId]) mistakes[topicId] = [];
  if (!mistakes[topicId].includes(qIdx)) {
    mistakes[topicId].push(qIdx);
    saveMistakes();
  }
}
function removeMistake(topicId, qIdx) {
  if (!mistakes[topicId]) return;
  const i = mistakes[topicId].indexOf(qIdx);
  if (i > -1) {
    mistakes[topicId].splice(i, 1);
    if (mistakes[topicId].length === 0) delete mistakes[topicId];
    saveMistakes();
  }
}
function addHistoryEntry(topicId, score, total, isExam) {
  if (!history[topicId]) history[topicId] = [];
  history[topicId].unshift({
    date: new Date().toISOString(),
    score: score, total: total, isExam: !!isExam,
    pct: Math.round(score / total * 100)
  });
  if (history[topicId].length > 20) history[topicId] = history[topicId].slice(0, 20);
  saveHistory();
}
function formatHistoryDate(iso) {
  try {
    const d = new Date(iso);
    const today = new Date();
    const isToday = d.toDateString() === today.toDateString();
    if (isToday) return d.toTimeString().slice(0, 5);
    return d.toLocaleDateString('uk-UA', { day: '2-digit', month: '2-digit' });
  } catch(e) { return ''; }
}

function stopTimer() {
  if (state.timerRaf) { cancelAnimationFrame(state.timerRaf); state.timerRaf = null; }
  const bar = document.getElementById('timer-bar');
  const txt = document.getElementById('timer-text');
  if (bar) bar.style.width = '0%';
  if (txt) txt.textContent = '';
}

function startTimer() {
  if (!state.timerOn) return;
  state.timerStart = performance.now();
  const bar = document.getElementById('timer-bar');
  const txt = document.getElementById('timer-text');
  if (!bar || !txt) return;
  function tick(now) {
    const elapsed = (now - state.timerStart) / 1000;
    const remaining = QUESTION_TIME - elapsed;
    if (remaining <= 0) {
      bar.style.width = '0%';
      txt.textContent = '0';
      stopTimer();
      // Авто-неправильна відповідь
      if (!state.locked) {
        state.locked = true;
        forceTimeoutAnswer();
      }
      return;
    }
    const pctLeft = Math.max(0, remaining / QUESTION_TIME);
    bar.style.width = (pctLeft * 100) + '%';
    txt.textContent = Math.ceil(remaining).toString();
    if (remaining < 5) { bar.classList.add('low'); } else { bar.classList.remove('low'); }
    state.timerRaf = requestAnimationFrame(tick);
  }
  state.timerRaf = requestAnimationFrame(tick);
}

function forceTimeoutAnswer() {
  // Час вийшов — позначаємо як помилку, показуємо правильну відповідь
  const t = state.topic;
  const realIdx = state.order[state.qIdx];
  const q = t.questions[realIdx];
  const correct = q.c;
  // не додаємо score
  document.querySelectorAll(".option").forEach((b) => {
    b.disabled = true;
    const orig = +b.dataset.orig;
    if (orig === correct) b.classList.add("correct");
  });
  state.combo = 0;
  updateComboDisplay();
  const src = getSourceFor(t, realIdx);
  addMistake(src.topicId, src.qIdx);
  recordAnswer(src.topicId, false);
  const correctDisplayIdx = state.optionOrder.indexOf(correct);
  const exp = $("explanation");
  exp.innerHTML = '<span class="verdict bad">⏱ Час вийшов</span><b>Правильна відповідь: ' + ["А","Б","В","Г"][correctDisplayIdx] + '.</b> ' + q.e + reportButtonHTML(q);
  exp.classList.add("show");
  $("next-btn").classList.add("show");
  $("progress-bar").style.width = ((state.qIdx + 1) / t.questions.length * 100) + "%";
}

function useHint() {
  if (state.hintsLeft <= 0 || state.locked) return;
  const t = state.topic;
  const realIdx = state.order[state.qIdx];
  const q = t.questions[realIdx];
  const correct = q.c;
  // знайти кнопки, що НЕ правильні і ще не приховані
  const wrongs = [];
  document.querySelectorAll(".option").forEach(b => {
    const orig = +b.dataset.orig;
    if (orig !== correct && !b.classList.contains('hint-hidden')) wrongs.push(b);
  });
  if (wrongs.length < 2) return;
  // прибрати 2 випадкові
  shuffleArray(wrongs).slice(0, 2).forEach(b => { b.classList.add('hint-hidden'); b.disabled = true; });
  state.hintsLeft--;
  updateHintDisplay();
}

function shuffleArray(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getVerdict(pct) {
  if (pct === 100) return { text: "ЧЕМПІОН", color: "#2ecc71" };
  if (pct >= 85) return { text: "МАЙЖЕ БЕЗДОГАННО", color: "#2ecc71" };
  if (pct >= 70) return { text: "ДОБРЕ", color: "#ff7b00" };
  if (pct >= 50) return { text: "МОЖНА КРАЩЕ", color: "#ff7b00" };
  return { text: "ТРЕБА ПОВТОРИТИ", color: "#e63946" };
}

function generateResultImage() {
  const canvas = document.createElement('canvas');
  const W = 1080, H = 1080;
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  const t = state.topic;
  const total = t.questions.length;
  const pct = Math.round((state.score / total) * 100);
  let verdict;
  if (state.isExam) {
    if (pct === 100) verdict = { text: "ЛЕГЕНДА", color: "#f1c40f" };
    else if (pct >= 85) verdict = { text: "МАЙСТЕР-ТРЕНЕР", color: "#2ecc71" };
    else if (pct >= 50) verdict = { text: "ТРЕНЕР", color: "#2ecc71" };
    else if (pct >= 30) verdict = { text: "ПОКИ НЕ ТРЕНЕР", color: "#ff7b00" };
    else verdict = { text: "ДО МАТЕРІАЛУ", color: "#e63946" };
  } else {
    verdict = getVerdict(pct);
  }

  // Background
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#0a0a0a');
  bg.addColorStop(1, '#150505');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // Red glow top-left
  const glow1 = ctx.createRadialGradient(160, 100, 0, 160, 100, 700);
  glow1.addColorStop(0, 'rgba(230,57,70,0.32)');
  glow1.addColorStop(1, 'rgba(230,57,70,0)');
  ctx.fillStyle = glow1;
  ctx.fillRect(0, 0, W, H);

  // Orange glow bottom-right
  const glow2 = ctx.createRadialGradient(W-200, H-100, 0, W-200, H-100, 700);
  glow2.addColorStop(0, 'rgba(255,123,0,0.20)');
  glow2.addColorStop(1, 'rgba(255,123,0,0)');
  ctx.fillStyle = glow2;
  ctx.fillRect(0, 0, W, H);

  // Grid pattern
  ctx.strokeStyle = 'rgba(255,255,255,0.025)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 60) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
  for (let y = 0; y < H; y += 60) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

  // Border
  ctx.strokeStyle = 'rgba(230,57,70,0.4)';
  ctx.lineWidth = 6;
  ctx.strokeRect(30, 30, W-60, H-60);

  // Brand icon (dumbbell emoji-like) circle
  ctx.fillStyle = '#e63946';
  ctx.beginPath();
  ctx.arc(W/2, 180, 60, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = '700 60px Arial, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('💪', W/2, 180);

  // Title
  ctx.fillStyle = '#fff';
  ctx.font = '900 76px Impact, "Arial Black", sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('IRON ACADEMY', W/2, 320);

  // Accent line
  ctx.fillStyle = '#e63946';
  ctx.fillRect(W/2 - 100, 360, 200, 5);

  // Topic name
  ctx.fillStyle = '#9a9a9a';
  ctx.font = '600 36px Arial, sans-serif';
  const topicText = t.title.toUpperCase();
  ctx.fillText(topicText, W/2, 425);

  // Big score
  ctx.fillStyle = '#fff';
  ctx.font = '900 220px Impact, "Arial Black", sans-serif';
  ctx.fillText(state.score + ' / ' + total, W/2, 640);

  // Percentage circle / pct text
  ctx.fillStyle = verdict.color;
  ctx.font = '900 96px Impact, "Arial Black", sans-serif';
  ctx.fillText(pct + '%', W/2, 800);

  // Verdict
  ctx.fillStyle = '#fff';
  ctx.font = '700 44px Arial, sans-serif';
  ctx.fillText(verdict.text, W/2, 880);

  // URL
  ctx.fillStyle = '#6a6a6a';
  ctx.font = '500 26px Arial, sans-serif';
  ctx.fillText('test-workout.vercel.app', W/2, 1010);

  return canvas;
}

function canvasToBlob(canvas) {
  return new Promise(resolve => canvas.toBlob(resolve, 'image/png', 0.95));
}

async function shareResult() {
  const t = state.topic;
  const total = t.questions.length;
  const pct = Math.round((state.score / total) * 100);
  const verdictText = state.isExam
    ? (pct >= 50 ? `✅ Тренер (${pct}%)` : `❌ Поки не тренер (${pct}%)`)
    : `${pct}%`;
  const text = state.isExam
    ? `🏆 Iron Academy — ФІНАЛЬНИЙ ІСПИТ\n${state.score}/${total} — ${verdictText}\n\nСпробуй і ти: ${SITE_URL}`
    : `Iron Academy 💪\n${t.title}: ${state.score}/${total} (${pct}%)\n${SITE_URL}`;

  let canvas;
  try { canvas = generateResultImage(); }
  catch (e) {
    // fallback to text share
    if (navigator.share) { try { await navigator.share({ text: text, url: SITE_URL }); return; } catch(_) {} }
    try { await navigator.clipboard.writeText(text); showToast('Скопійовано текст результату'); } catch(_) {}
    return;
  }

  const blob = await canvasToBlob(canvas);
  const file = new File([blob], 'iron-academy-result.png', { type: 'image/png' });

  // Try native share with file
  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    try {
      await navigator.share({ files: [file], title: 'Iron Academy', text: text });
      return;
    } catch (e) { if (e.name === 'AbortError') return; }
  }

  // Try copy image to clipboard (desktop Chrome/Edge)
  let copied = false;
  try {
    if (navigator.clipboard && window.ClipboardItem) {
      await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
      copied = true;
      showToast('Фото скопійовано в буфер ✓');
    }
  } catch(e) {}

  // Always offer download as a reliable fallback
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'iron-academy-result.png';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 5000);
  if (!copied) showToast('Фото збережено в Завантаження');
}

  for (let i = 0; i < days; i++) {
    const d = new Date(start); d.setDate(start.getDate() + i);
    const k = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');

function startExam() {
  const N = 25;
  const pool = [];
  TOPICS.forEach(t => t.questions.forEach((q, qi) => pool.push({ q: q, topicId: t.id, qIdx: qi })));
  const sampled = shuffleArray(pool).slice(0, Math.min(N, pool.length));
  const examTopic = {
    id: '_exam',
    icon: '&#x1F3C6;',
    title: 'Фінальний іспит',
    questions: sampled.map(s => s.q),
    sources: sampled.map(s => ({ topicId: s.topicId, qIdx: s.qIdx })),
    isExam: true
  };
  const indices = Array.from({ length: examTopic.questions.length }, (_, i) => i);
  state = { topic: examTopic, topicIdx: -1, qIdx: 0, score: 0, locked: false, order: indices, isExam: true, isMistakes: false, combo: 0, maxCombo: 0, hintsLeft: INITIAL_HINTS, timerOn: !!timerByTopic['_exam'], removedByHint: [] };
  $("topic-select").style.display = "none";
  $("result-screen").classList.remove("active");
  $("quiz-screen").classList.add("active");
  $("quiz-title").textContent = examTopic.title;
  $("q-total").textContent = examTopic.questions.length;
  window.scrollTo({ top: 0, behavior: 'smooth' });
  renderQuestion();
}

function startMistakes(event, topicIdx) {
  if (event) { event.stopPropagation(); event.preventDefault(); }
  const baseTopic = TOPICS[topicIdx];
  const ids = (mistakes[baseTopic.id] || []).slice();
  if (ids.length === 0) { showToast('Немає помилок — нічого повторювати'); return; }
  const questions = ids.map(i => baseTopic.questions[i]);
  const mistakeTopic = {
    id: baseTopic.id,
    icon: '&#x1F3AF;',
    title: baseTopic.title + ' — Помилки',
    questions: questions,
    sourceIndices: ids,
    baseTopic: baseTopic,
    isMistakes: true
  };
  const indices = Array.from({ length: questions.length }, (_, i) => i);
  state = { topic: mistakeTopic, topicIdx: topicIdx, qIdx: 0, score: 0, locked: false, order: shuffleArray(indices), isExam: false, isMistakes: true, combo: 0, maxCombo: 0, hintsLeft: INITIAL_HINTS, timerOn: false, removedByHint: [] };
  $("topic-select").style.display = "none";
  $("result-screen").classList.remove("active");
  $("quiz-screen").classList.add("active");
  $("quiz-title").textContent = mistakeTopic.title;
  $("q-total").textContent = questions.length;
  window.scrollTo({ top: 0, behavior: 'smooth' });
  renderQuestion();
}

function getSourceFor(topic, realIdx) {
  if (topic.isMistakes) return { topicId: topic.baseTopic.id, qIdx: topic.sourceIndices[realIdx] };
  if (topic.sources) return topic.sources[realIdx];
  return { topicId: topic.id, qIdx: realIdx };
}

function renderQuestion() {
  stopTimer();
  const t = state.topic;
  const realIdx = state.order[state.qIdx];
  const q = t.questions[realIdx];
  $("q-current").textContent = state.qIdx + 1;
  $("progress-bar").style.width = (state.qIdx / t.questions.length * 100) + "%";
  const letters = ["А", "Б", "В", "Г"];
  const optionOrder = shuffleArray([0, 1, 2, 3]);
  state.optionOrder = optionOrder;
  state.removedByHint = [];

  const timerHTML = state.timerOn ? `
    <div class="timer-row">
      <div class="timer-track"><div class="timer-fill" id="timer-bar"></div></div>
      <div class="timer-text"><span id="timer-text">${QUESTION_TIME}</span>с</div>
    </div>` : '';

  const hintHTML = `
    <button class="hint-btn ${state.hintsLeft <= 0 ? 'used' : ''}" id="hint-btn" onclick="useHint()">
      <span>&#x1F3B2; Підказка 50/50</span>
      <span class="hint-pill">Залишилось: <span id="hint-count">${state.hintsLeft}</span></span>
    </button>`;

  $("quiz-body").innerHTML = `
    <div class="combo-indicator" id="combo-indicator"></div>
    <div class="question-card">
      ${timerHTML}
      <div class="question">${q.q}</div>
      ${hintHTML}
      <div class="options">
        ${optionOrder.map((origIdx, displayIdx) => `
          <button class="option" data-orig="${origIdx}" onclick="answer(${origIdx})">
            <span class="option-letter">${letters[displayIdx]}</span>
            <span>${q.a[origIdx]}</span>
          </button>
        `).join("")}
      </div>
      <div class="explanation" id="explanation"></div>
      <button class="next-btn" id="next-btn" onclick="nextQuestion()">
        ${state.qIdx + 1 < t.questions.length ? "Наступне питання &rarr;" : "Подивитись результат"}
      </button>
    </div>
  `;
  state.locked = false;
  updateComboDisplay();
  startTimer();
}

function answer(origIdx) {
  if (state.locked) return;
  state.locked = true;
  stopTimer();
  const t = state.topic;
  const realIdx = state.order[state.qIdx];
  const q = t.questions[realIdx];
  const correct = q.c;
  const isCorrect = origIdx === correct;
  if (isCorrect) state.score++;

  // Combo
  if (isCorrect) {
    state.combo++;
    if (state.combo > state.maxCombo) state.maxCombo = state.combo;
  } else {
    state.combo = 0;
  }
  updateComboDisplay();

  // Track mistakes + global stats
  const src = getSourceFor(t, realIdx);
  if (isCorrect) {
    if (state.isMistakes) removeMistake(src.topicId, src.qIdx);
  } else {
    addMistake(src.topicId, src.qIdx);
  }
  recordAnswer(src.topicId, isCorrect);

  document.querySelectorAll(".option").forEach((b) => {
    b.disabled = true;
    const orig = +b.dataset.orig;
    if (orig === correct) b.classList.add("correct");
    if (orig === origIdx && !isCorrect) b.classList.add("wrong");
  });
  const correctDisplayIdx = state.optionOrder.indexOf(correct);
  const exp = $("explanation");
  exp.innerHTML = `
    <span class="verdict ${isCorrect ? 'good' : 'bad'}">${isCorrect ? '&#x2713; Вірно' : '&#x2717; Не вірно'}</span>
    <b>Правильна відповідь: ${["А","Б","В","Г"][correctDisplayIdx]}.</b> ${q.e}
    ${reportButtonHTML(q)}
  `;
  exp.classList.add("show");
  $("next-btn").classList.add("show");
  $("progress-bar").style.width = ((state.qIdx + 1) / t.questions.length * 100) + "%";
  setTimeout(() => exp.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 100);
  checkAchievements({});
}

function nextQuestion() {
  const t = state.topic;
  state.qIdx++;
  if (state.qIdx >= t.questions.length) showResult();
  else { renderQuestion(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
}

function showResult() {
  stopTimer();
  const t = state.topic;
  const total = t.questions.length;
  const pct = Math.round((state.score / total) * 100);
  $("quiz-screen").classList.remove("active");
  $("result-screen").classList.add("active");
  recordQuizComplete({ isExam: state.isExam, pct: pct, maxCombo: state.maxCombo });
  checkAchievements({ pct: pct, isExam: state.isExam, isMistakes: state.isMistakes });
  $("score-num").textContent = state.score;
  $("score-total").textContent = total;
  $("score-percent").textContent = pct + "% правильних відповідей";

  const card = document.querySelector(".result-card");
  card.classList.remove("pass", "fail", "legend");
  const stampOld = document.getElementById("result-stamp");
  if (stampOld) stampOld.remove();

  let emoji, title, sub, stamp = null, stampClass = "";

  if (state.isExam) {
    // Exam mode
    if (pct === 100) {
      emoji = "&#x1F451;"; title = "ЛЕГЕНДА!"; sub = "Абсолютний результат. Ти не просто тренер — ти Майстер.";
      stamp = "ЛЕГЕНДА"; stampClass = "legend"; card.classList.add("legend");
    } else if (pct >= 85) {
      emoji = "&#x1F3C6;"; title = "МАЙСТЕР-ТРЕНЕР"; sub = "Видатний результат. Клієнти будуть тобі довіряти.";
      stamp = "СКЛАВ"; stampClass = "pass"; card.classList.add("pass");
    } else if (pct >= 50) {
      emoji = "&#x1F4AA;"; title = "ТИ ТРЕНЕР!"; sub = "Іспит складено. База знань достатня — продовжуй вдосконалюватись.";
      stamp = "СКЛАВ"; stampClass = "pass"; card.classList.add("pass");
    } else if (pct >= 30) {
      emoji = "&#x1F62D;"; title = "ПОКИ НЕ ТРЕНЕР..."; sub = "Зовсім трохи не вистачило. Повтори матеріал — і складеш!";
      stamp = "НЕ СКЛАВ"; stampClass = "fail"; card.classList.add("fail");
    } else {
      emoji = "&#x1F4DA;"; title = "ПОВЕРНИСЯ ДО КНИГ"; sub = "Знань поки що мало. Не здавайся — все попереду.";
      stamp = "НЕ СКЛАВ"; stampClass = "fail"; card.classList.add("fail");
    }
  } else {
    if (pct === 100) { emoji = "&#x1F3C6;"; title = "Чемпіон!"; sub = "Усі питання — у яблучко. Ти готовий!"; }
    else if (pct >= 85) { emoji = "&#x1F525;"; title = "Майже бездоганно"; sub = "Лише дрібниці залишилось підтягнути."; }
    else if (pct >= 70) { emoji = "&#x1F4AA;"; title = "Добре"; sub = "Базу опанував. Перечитай складні питання."; }
    else if (pct >= 50) { emoji = "&#x26A1;"; title = "Можна краще"; sub = "Повтори тему і пройди ще раз."; }
    else { emoji = "&#x1F4DA;"; title = "Час повертатись до матеріалу"; sub = "Не страшно — кожен починав з нуля."; }
  }

  $("result-emoji").innerHTML = emoji;
  $("result-title").textContent = title;
  $("result-subtitle").textContent = sub;

  if (stamp) {
    const stampEl = document.createElement("div");
    stampEl.id = "result-stamp";
    stampEl.className = "stamp " + stampClass;
    stampEl.textContent = stamp;
    $("result-title").after(stampEl);
  }

  // ===== History =====
  const histOld = document.getElementById("result-history");
  if (histOld) histOld.remove();
  if (!state.isMistakes) {
    const histKey = state.isExam ? '_exam' : t.id;
    addHistoryEntry(histKey, state.score, total, state.isExam);
    const prev = (history[histKey] || []).slice(1, 6); // skip just-added entry, show up to 5 previous
    if (prev.length > 0) {
      const block = document.createElement('div');
      block.id = 'result-history';
      block.className = 'history-block';
      const chips = prev.map(h => {
        const cls = h.pct >= 70 ? 'good' : h.pct >= 50 ? 'mid' : 'bad';
        return `<span class="history-chip ${cls}"><span class="pct">${h.pct}%</span><span class="date">${formatHistoryDate(h.date)}</span></span>`;
      }).join('');
      block.innerHTML = `<div class="h-label">Попередні спроби (${prev.length})</div><div class="history-list">${chips}</div>`;
      document.querySelector('.actions').before(block);
    }
  }

  window.scrollTo({ top: 0, behavior: 'smooth' });

  // FX
  stopFx();
  if (state.isExam) {
    setTimeout(() => {
      if (pct >= 50) runConfetti(pct === 100 ? 8000 : 5500);
      else runSadFall(5000);
    }, 250);
  }
}

function restartQuiz() {
  stopFx();
  if (state.isExam) startExam();
  else if (state.isMistakes) startMistakes(null, state.topicIdx);
  else startQuiz(state.topicIdx);
}
function backToTopics() {
  stopFx();
  stopTimer();
  $("quiz-screen").classList.remove("active");
  $("result-screen").classList.remove("active");
  $("stats-screen").classList.remove("active");
  $("achievements-screen").classList.remove("active");
  $("topic-select").style.display = "block";
  renderTopics(); // re-render to reflect updated mistakes count
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ============== FX: confetti + sad rain ============== */
function stopFx() {
  if (fxRaf) { cancelAnimationFrame(fxRaf); fxRaf = null; }
  const canvas = $("fx-canvas");
  if (canvas) {
    const ctx = canvas.getContext('2d');
    ctx && ctx.clearRect(0, 0, canvas.width, canvas.height);
    canvas.style.display = 'none';
  }
}

function runConfetti(durationMs) {
  const canvas = $("fx-canvas");
  canvas.style.display = 'block';
  const dpr = window.devicePixelRatio || 1;
  canvas.width = window.innerWidth * dpr;
  canvas.height = window.innerHeight * dpr;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const W = window.innerWidth, H = window.innerHeight;
  const colors = ['#e63946', '#ff7b00', '#2ecc71', '#f1c40f', '#3498db', '#9b59b6', '#ffffff'];
  const particles = [];
  for (let i = 0; i < 220; i++) {
    particles.push({
      x: Math.random() * W,
      y: -20 - Math.random() * H * 0.5,
      vx: (Math.random() - 0.5) * 4,
      vy: 2 + Math.random() * 4,
      size: 6 + Math.random() * 9,
      rot: Math.random() * Math.PI * 2,
      vr: (Math.random() - 0.5) * 0.35,
      color: colors[Math.floor(Math.random() * colors.length)],
      shape: Math.random() < 0.5 ? 'rect' : 'circle'
    });
  }
  // Fireworks bursts
  const bursts = [];
  function addBurst() {
    const cx = W * (0.2 + Math.random() * 0.6);
    const cy = H * (0.2 + Math.random() * 0.4);
    const color = colors[Math.floor(Math.random() * colors.length)];
    for (let i = 0; i < 36; i++) {
      const a = (i / 36) * Math.PI * 2;
      const sp = 3 + Math.random() * 3;
      bursts.push({
        x: cx, y: cy,
        vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
        life: 1.0, color: color
      });
    }
  }
  addBurst();
  const burstTimer = setInterval(addBurst, 700);

  const start = performance.now();
  function frame(now) {
    const elapsed = now - start;
    ctx.clearRect(0, 0, W, H);
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.vy += 0.04; p.rot += p.vr;
      if (p.y > H + 20) { p.y = -20; p.x = Math.random() * W; }
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      if (p.shape === 'rect') ctx.fillRect(-p.size/2, -p.size/4, p.size, p.size * 0.5);
      else { ctx.beginPath(); ctx.arc(0, 0, p.size/2, 0, Math.PI*2); ctx.fill(); }
      ctx.restore();
    });
    bursts.forEach(b => {
      b.x += b.vx; b.y += b.vy; b.vy += 0.05; b.life -= 0.015;
      if (b.life > 0) {
        ctx.fillStyle = b.color;
        ctx.globalAlpha = Math.max(0, b.life);
        ctx.beginPath();
        ctx.arc(b.x, b.y, 3, 0, Math.PI*2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    });
    for (let i = bursts.length - 1; i >= 0; i--) if (bursts[i].life <= 0) bursts.splice(i, 1);
    if (elapsed < durationMs) fxRaf = requestAnimationFrame(frame);
    else { clearInterval(burstTimer); stopFx(); }
  }
  fxRaf = requestAnimationFrame(frame);
}

function runSadFall(durationMs) {
  const canvas = $("fx-canvas");
  canvas.style.display = 'block';
  const dpr = window.devicePixelRatio || 1;
  canvas.width = window.innerWidth * dpr;
  canvas.height = window.innerHeight * dpr;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const W = window.innerWidth, H = window.innerHeight;
  const symbols = ['💔', '😢', '✕'];
  const items = [];
  for (let i = 0; i < 50; i++) {
    items.push({
      x: Math.random() * W,
      y: -30 - Math.random() * H,
      vy: 1 + Math.random() * 2,
      size: 22 + Math.random() * 16,
      rot: (Math.random() - 0.5) * 0.4,
      sym: symbols[Math.floor(Math.random() * symbols.length)],
      alpha: 0.7 + Math.random() * 0.3
    });
  }
  const start = performance.now();
  function frame(now) {
    const elapsed = now - start;
    ctx.clearRect(0, 0, W, H);
    items.forEach(it => {
      it.y += it.vy;
      it.x += Math.sin((it.y + it.size) * 0.01) * 0.7;
      if (it.y > H + 40) { it.y = -30; it.x = Math.random() * W; }
      ctx.save();
      ctx.translate(it.x, it.y);
      ctx.rotate(it.rot);
      ctx.globalAlpha = it.alpha;
      ctx.font = it.size + 'px serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(it.sym, 0, 0);
      ctx.restore();
    });
    ctx.globalAlpha = 1;
    if (elapsed < durationMs) fxRaf = requestAnimationFrame(frame);
    else stopFx();
  }
  fxRaf = requestAnimationFrame(frame);
}

renderTopics();
</script>
